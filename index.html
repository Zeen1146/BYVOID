<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYVOID | DIGITAL ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        #plexusCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .main-panel {
            position: relative; z-index: 10; width: 90%; max-width: 360px;
            padding: 30px 20px; background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(25px); border: 1px solid rgba(0, 100, 255, 0.2);
            border-radius: 24px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .avatar-box { width: 60px; height: 60px; background: #1a1a1a; border: 1px solid #333; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-weight: 800; font-size: 1.5rem; text-shadow: 0 0 15px #fff; }

        h1 { font-size: 1.4rem; letter-spacing: 4px; font-weight: 800; margin-bottom: 5px; }
        .tagline { font-size: 0.7rem; color: #888; letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; }

        .link-list { display: flex; flex-direction: column; gap: 12px; }
        .panel-btn {
            padding: 16px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            color: #ccc; text-decoration: none; font-size: 0.8rem; font-weight: 600;
            letter-spacing: 1px; transition: 0.3s;
        }
        .panel-btn:hover { background: rgba(0, 100, 255, 0.1); border-color: #0064ff; color: #fff; transform: translateY(-2px); }
        .active-btn { border-color: rgba(0, 100, 255, 0.5); box-shadow: 0 0 15px rgba(0, 100, 255, 0.2); }

        .footer-container { margin-top: 30px; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 20px; }
        .gh-link {
            text-decoration: none; color: rgba(255, 255, 255, 0.4);
            display: flex; align-items: center; justify-content: center;
            gap: 8px; font-size: 0.7rem; font-weight: 700; transition: 0.3s;
        }
        .gh-link:hover { color: #fff; }
        .est { font-size: 0.55rem; color: #222; margin-top: 10px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <canvas id="plexusCanvas"></canvas>

    <div class="main-panel">
        <div class="avatar-box">Z</div>
        <h1>BYVOID</h1>

        <div class="link-list">

            <a href="https://github.com/Zeen1146/BYVOID" target="_blank" class="gh-link">
                <svg height="16" viewBox="0 0 16 16" width="16" style="fill: currentColor;"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.90.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path></svg>
                SOURCE CODE
            </a>
            <div class="est">EST. 2026 // VOCATIONAL DEV</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('plexusCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
        }

        for (let i = 0; i < 60; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                particles.forEach(p2 => {
                    let dx = p.x - p2.x;
                    let dy = p.y - p2.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(0, 100, 255, ${1 - dist/120})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                });
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
