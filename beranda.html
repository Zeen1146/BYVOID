<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYVOID HUB 🦾</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: white; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin:0; }
        .main-panel { width: 90%; max-width: 350px; padding: 25px; background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 100, 255, 0.2); border-radius: 20px; text-align: center; }
        h1 { font-size: 1.3rem; letter-spacing: 2px; margin-bottom: 25px; color: #fff; text-shadow: 0 0 10px white; }
        #project-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        
        /* Container Tombol & Hapus */
        .project-wrapper { display: flex; align-items: center; gap: 8px; }
        .project-item { flex-grow: 1; padding: 16px; background: #3b82f6; border-radius: 12px; text-decoration: none; color: white; font-size: 0.85rem; font-weight: 600; text-align: center; transition: 0.3s; }
        
        /* Tombol Hapus (X) */
        .delete-btn { background: #ef4444; color: white; border: none; border-radius: 10px; width: 40px; height: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .delete-btn:hover { background: #b91c1c; transform: scale(1.05); }

        .add-btn { padding: 12px; background: transparent; border: 2px dashed #3b82f6; border-radius: 12px; color: #3b82f6; font-size: 0.8rem; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .back-btn { margin-top: 15px; font-size: 0.7rem; color: #555; text-decoration: none; display: block; }
    </style>
</head>
<body>
    <div class="main-panel">
        <h1>BYVOID HUB 🦾</h1>
        <div id="project-list"></div>
        <button class="add-btn" onclick="addNewProject()">+ TAMBAH PROYEK BARU</button>
        <a href="index.html" class="back-btn"><< BACK TO GATE</a>
    </div>

    <script>
        const container = document.getElementById('project-list');

        function loadProjects() {
            container.innerHTML = "";
            const savedProjects = JSON.parse(localStorage.getItem('myProjects')) || [
                { name: "QR CODE GENERATOR", file: "QR_kode_generator_V2.html" }
            ];
            
            savedProjects.forEach((proj, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'project-wrapper';

                const btn = document.createElement('a');
                btn.className = 'project-item';
                btn.href = proj.file;
                btn.innerText = `🚀 ${proj.name}`;

                const del = document.createElement('button');
                del.className = 'delete-btn';
                del.innerText = 'X';
                del.onclick = () => deleteProject(index);

                wrapper.appendChild(btn);
                wrapper.appendChild(del);
                container.appendChild(wrapper);
            });
            localStorage.setItem('myProjects', JSON.stringify(savedProjects));
        }

        function addNewProject() {
            const name = prompt("Nama Proyek:");
            if (!name) return;
            const file = prompt("Nama File (misal: game.html):");
            if (!file) return;

            const savedProjects = JSON.parse(localStorage.getItem('myProjects'));
            savedProjects.push({ name: name.toUpperCase(), file: file });
            localStorage.setItem('myProjects', JSON.stringify(savedProjects));
            loadProjects();
        }

        function deleteProject(index) {
            if (confirm("Hapus proyek ini?")) {
                const savedProjects = JSON.parse(localStorage.getItem('myProjects'));
                savedProjects.splice(index, 1);
                localStorage.setItem('myProjects', JSON.stringify(savedProjects));
                loadProjects();
            }
        }

        loadProjects();
    </script>
</body>
</html>
