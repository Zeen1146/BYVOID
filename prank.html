<script>
    function startPrank() {
        const audio = document.getElementById('scaryAudio');
        const layer = document.getElementById('scare-layer');
        const box = document.getElementById('mainBox');

        audio.volume = 1.0; 
        audio.loop = true;
        audio.play();

        // TRIK BIAR TETEP BUNYI DI LATAR BELAKANG (BISA DI CONTROL DARI NOTIFIKASI)
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: 'SYSTEM ERROR 404',
                artist: 'Virus Detected',
                album: 'BYVOID PRANK',
                artwork: [{ src: 'https://via.placeholder.com/512/ff0000/ffffff?text=ERROR', sizes: '512x512', type: 'image/png' }]
            });

            // Biar kalau dia pencet pause di notif, suaranya malah makin kenceng/play lagi
            navigator.mediaSession.setActionHandler('pause', () => {
                audio.play(); 
            });
        }

        box.style.display = 'none';
        layer.style.display = 'flex';

        if (navigator.vibrate) {
            navigator.vibrate([500, 200, 500, 200, 1000]);
        }
    }
</script>
